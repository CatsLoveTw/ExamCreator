name: Run Exam Parser Catcher

on:
  schedule:
    # 每天 07:00 與 19:00 各執行一次（台灣時間下午3點與凌晨3點）
    - cron: '0 7,19 * * *'
  workflow_dispatch: # 手動強制執行

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install rclone (官方原生安裝)
        run: |
          sudo apt-get update && sudo apt-get install -y curl unzip
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone
        env:
          GEMINI_API_KEYS_ENV: ${{ secrets.GEMINI_API_KEYS }}
          # 引入個人帳號的 OAuth 授權 Token
          GDRIVE_OAUTH_TOKEN_ENV: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          printf "%s" "$GEMINI_API_KEYS_ENV" > key.txt
          
          # 直接使用個人 Token 建立 rclone.conf (免用服務帳號 JSON)
          cat << EOF > rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = $GDRIVE_OAUTH_TOKEN_ENV
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

      - name: Pull Workspace from Google Drive
        run: |
          echo "⬇️ 開始從 Google Drive 雲端同步最新進度與題庫..."
          mkdir -p gdrive_workspace
          rclone sync gdrive: ./gdrive_workspace --config rclone.conf -v

          # 解壓縮題庫 ZIP 檔到執行環境
          if [ -f "./gdrive_workspace/exams.zip" ]; then
            echo "📦 找到 exams.zip，正在解壓縮..."
            unzip -q -o ./gdrive_workspace/exams.zip -d ./
          else
            echo "⚠️ 警告：未在 Google Drive 找到 exams.zip"
          fi

          # 將雲端的歷史解析結果複製過來，讓 catcher.py 能進行重複判定
          mkdir -p exam_database_output
          if [ -d "./gdrive_workspace/exam_database_output" ]; then
            cp -r ./gdrive_workspace/exam_database_output/* ./exam_database_output/ || true
          fi
          
          # 複製知識庫與錯誤日誌
          cp ./gdrive_workspace/subject.json ./subject.json 2>/dev/null || true
          cp ./gdrive_workspace/key_errors_summary.txt ./key_errors_summary.txt 2>/dev/null || true

      - name: Run parser script
        env:
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python catcher.py

      - name: Push Results to Google Drive
        if: always()
        run: |
          echo "⬆️ 執行完畢，開始將最新解析結果上傳回 Google Drive..."
          
          # 同步輸出資料夾 (只會上傳/更新有變動的檔案)
          rclone sync ./exam_database_output gdrive:exam_database_output --config rclone.conf -v
          
          # 更新知識庫與金鑰日誌檔
          if [ -f "./subject.json" ]; then
            rclone copyto ./subject.json gdrive:subject.json --config rclone.conf -v
          fi
          if [ -f "./key_errors_summary.txt" ]; then
            rclone copyto ./key_errors_summary.txt gdrive:key_errors_summary.txt --config rclone.conf -v
          fi
          
          # 清除敏感金鑰與暫存
          rm rclone.conf key.txt
