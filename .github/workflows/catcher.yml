name: Run Exam Parser Catcher

on:
  schedule:
    # 每天 07:00 與 19:00 各執行一次（15:00 / 03:00）
    - cron: '0 7,19 * * *'
  push:
    branches:
      - main
    paths:
      # 當 parser 程式本身或工作流更新時觸發
      - 'catcher.py'
      - '.github/workflows/**'
  workflow_dispatch: # 手動強制執行

jobs:
  run-parser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安裝專門下載 Google Drive 大檔案的 gdown 工具
          pip install gdown

      # 💡 [新增步驟] 從雲端硬碟下載並解壓原始 PDF 試卷
      - name: Download and Unzip Exam Papers
        run: |
          echo "⬇️ 正在從雲端下載考卷壓縮檔..."
          
          # 請將下方 URL 中的 FILE_ID 替換為您分享連結中 file/d/ 之後的那串字元
          gdown "10MeFHvfK-bAZQ3FZ0lMko_ba0RYtfwsT" -O exams_temp.zip
          
          echo "📂 正在解壓縮檔案..."
          # 解壓縮至工作區目錄
          unzip -o -q exams_temp.zip -d ./
          
          # 安全清理下載的 zip 暫存檔，確保不佔用額外硬碟空間
          rm -f exams_temp.zip
          
          # 檢查確認解壓後的路徑是否存在（供除錯使用）
          echo "🔍 檢查目前目錄結構："
          ls -ld ast_exam_papers_only gsat_exam_papers_only || echo "⚠️ 警告：解壓路徑與預期不符，請確認 zip 內的目錄結構是否正確。"

      - name: Create key.txt from Secrets
        run: |
          echo "${{ secrets.GEMINI_API_KEYS }}" > key.txt

      - name: Unzip previous database output if exists
        run: |
          # 偵測是否存在歷史分割壓縮檔
          if ls exam_database_output_part_* 1> /dev/null 2>&1; then
            echo "📦 偵測到歷史分割壓縮檔，正在合併並解壓縮以供 Catcher 偵測跳過..."
            # 1. 將分割檔合併為一個暫存的完整大 zip
            cat exam_database_output_part_* > exam_database_output_temp.zip
            # 2. 強制解壓縮
            unzip -o -q exam_database_output_temp.zip -d ./
            # 3. 移除暫存檔
            rm -f exam_database_output_temp.zip
          else
            echo "🆕 未偵測到歷史分割壓縮檔，將建立全新資料庫結構。"
          fi

      - name: Run parser script
        run: python catcher.py

      - name: Zip database output and clean up folder
        if: always()
        run: |
          if [ -d exam_database_output ]; then
            echo "🗜️ 正在壓縮最新結果，並自動分割檔案以繞過 GitHub 100MB 限制..."
            # 1. 先打包成暫存的完整大 zip
            zip -r -q exam_database_output_temp.zip exam_database_output/
            
            # 2. 刪除舊的分割檔（避免檔案縮小時殘留舊的字尾分割檔）
            rm -f exam_database_output_part_*
            
            # 3. 將大 zip 切割成每份上限 80MB 的子分割檔
            split -b 80M exam_database_output_temp.zip exam_database_output_part_
            
            # 4. 移除暫存的大 zip 檔
            rm -f exam_database_output_temp.zip
            
            echo "🧹 清除實體資料夾，防止其被 Git 追蹤..."
            rm -rf exam_database_output
          fi

      - name: Upload Key Status Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-key-status
          path: key_status.txt
          retention-days: 14 

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 僅 add 解析結果、subject 分類庫與錯誤日誌，絕對不 add 暫存的考卷資料夾
          # 停止追蹤先前引發錯誤的單一大壓縮檔（如果存在）
          git rm --cached exam_database_output.zip 2>/dev/null || true
          rm -f exam_database_output.zip

          # 提交分割檔案、分類庫與日誌
          if ls exam_database_output_part_* 1> /dev/null 2>&1; then
            git add exam_database_output_part_*
          fi
          git add subject.json key_errors_summary.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update exam database [skip ci]" && git push)