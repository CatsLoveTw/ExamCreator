name: Run Exam Parser Catcher

on:
  schedule:
    # 每天 07:00 與 19:00 各執行一次（台灣時間下午3點與凌晨3點）
    - cron: '0 7,19 * * *'
  workflow_dispatch: # 手動強制執行

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # 安裝 Noto Sans 繁體中文字型以支援 Linux 雲端背景繪圖
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install rclone (官方原生安裝)
        run: |
          sudo apt-get update && sudo apt-get install -y curl unzip
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone
        env:
          GEMINI_API_KEYS_ENV: ${{ secrets.GEMINI_API_KEYS }}
          GDRIVE_OAUTH_TOKEN_ENV: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          printf "%s" "$GEMINI_API_KEYS_ENV" > key.txt
          
          cat << EOF > rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = $GDRIVE_OAUTH_TOKEN_ENV
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF

      - name: Pull Workspace from Google Drive
        run: |
          echo "⬇️ 開始從 Google Drive 雲端同步最新進度與題庫..."
          mkdir -p gdrive_workspace
          rclone sync gdrive: ./gdrive_workspace --config rclone.conf -v

          # 1. 解壓縮一般題庫 exams.zip (若存在)
          if [ -f "./gdrive_workspace/exams.zip" ]; then
            echo "📦 找到 exams.zip，正在解壓縮..."
            unzip -q -o ./gdrive_workspace/exams.zip -d ./
          else
            echo "ℹ️ 提示：未在 Google Drive 找到 exams.zip"
          fi

          # 2. 解壓縮模擬考題庫 mock.zip (若存在，內含 mock_exam_papers_only)
          if [ -f "./gdrive_workspace/mock.zip" ]; then
            echo "📦 找到 mock.zip，正在解壓縮模擬考題庫..."
            unzip -q -o ./gdrive_workspace/mock.zip -d ./
          else
            echo "ℹ️ 提示：未在 Google Drive 找到 mock.zip"
          fi

          # 3. 🆕 解壓縮全套題庫 full.zip (若存在，內含 gsat_exam_papers_only 與 ast_exam_papers_only)
          if [ -f "./gdrive_workspace/full.zip" ]; then
            echo "📦 找到 full.zip，正在解壓縮全套題庫..."
            unzip -q -o ./gdrive_workspace/full.zip -d ./
          else
            echo "ℹ️ 提示：未在 Google Drive 找到 full.zip"
          fi

          # 4. 解壓縮學校段考題庫 school.zip (若存在，內含 school_exam_papers_only)
          if [ -f "./gdrive_workspace/school.zip" ]; then
            echo "📦 找到 school.zip，正在解壓縮學校定期考題庫..."
            unzip -q -o ./gdrive_workspace/school.zip -d ./
          else
            echo "ℹ️ 提示：未在 Google Drive 找到 school.zip"
          fi

          # 4. 列出當前環境中所有已準備就緒的題庫資料夾
          echo "🔍 檢查解壓後的題庫資料夾列表："
          ls -d *_exam_papers_only 2>/dev/null || echo "⚠️ 警告：未找到任何 *_exam_papers_only 題庫資料夾"

          # 將雲端的歷史解析結果複製過來，讓 catcher.py 能進行重複判定與斷點續傳
          mkdir -p exam_database_output
          if [ -d "./gdrive_workspace/exam_database_output" ]; then
            cp -r ./gdrive_workspace/exam_database_output/* ./exam_database_output/ || true
          fi
          
          # 複製知識庫與錯誤日誌
          cp ./gdrive_workspace/subject.json ./subject.json 2>/dev/null || true
          cp ./gdrive_workspace/key_errors_summary.txt ./key_errors_summary.txt 2>/dev/null || true

      - name: Run parser script
        env:
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python catcher.py

      - name: Push Results to Google Drive
        if: always()
        run: |
          echo "⬆️ 執行完畢，開始將最新解析結果（含學測、分科與模擬考）上傳回 Google Drive..."
          
          # 同步輸出資料夾 (只會上傳/更新有變動的 JSON 檔與圖片)
          rclone sync ./exam_database_output gdrive:exam_database_output --config rclone.conf -v
          
          # 更新知識庫與金鑰日誌檔
          if [ -f "./subject.json" ]; then
            rclone copyto ./subject.json gdrive:subject.json --config rclone.conf -v
          fi
          if [ -f "./key_errors_summary.txt" ]; then
            rclone copyto ./key_errors_summary.txt gdrive:key_errors_summary.txt --config rclone.conf -v
          fi
          
          # 清除敏感金鑰與暫存
          rm -f rclone.conf key.txt