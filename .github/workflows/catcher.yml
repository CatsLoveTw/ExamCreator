name: Run Exam Parser Catcher

on:
  schedule:
    # 每天 07:00 與 19:00 各執行一次（15:00 / 03:00）
    - cron: '0 7,19 * * *'
  push:
    branches:
      - main
    paths:
      # 當這些資料夾有新的 PDF 被 push 時，自動觸發解析
      - 'ast_exam_papers_only/**'
      - 'gsat_exam_papers_only/**'
  workflow_dispatch: # 手動強制執行

jobs:
  run-parser:
    runs-on: ubuntu-latest
    # 給予 Actions 寫入 Repo 的權限，for push :)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create key.txt from Secrets
        run: |
          echo "${{ secrets.GEMINI_API_KEYS }}" > key.txt

      - name: Run parser script
        run: python catcher.py
        

      - name: Upload Key Status Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-key-status
          path: key_status.txt
          retention-days: 14 

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add exam_database_output/ subject.json key_errors_summary.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update exam database [skip ci]" && git push)